<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Define codificación UTF-8 para acentos y símbolos. -->
  <meta charset="UTF-8" />

  <!-- Hace que la página se vea bien en celular. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título de la pestaña. -->
  <title>Login</title>

  <!-- Icono de la pestaña del navegador. -->
  <link rel="icon" type="image/png" href="images/PKBL.png">

  <!-- Hoja de estilos de Bootstrap. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" />

  <!-- Hoja de estilos personalizada del proyecto. -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="bg-light">

  <!-- Contenedor principal del login. -->
  <div class="login-wrapper">
    <div class="card shadow p-4 login-card">

      <!-- Logo principal del banco. -->
      <div class="bank-logo-wrap mb-3">
        <img src="images/PKBC.png" alt="Pokémon Bank" class="bank-logo">
      </div>

      <!-- Campo donde el usuario escribe el PIN. -->
      <div class="mb-3">
        <strong><label for="pin" class="form-label">PIN:</label></strong>
        <input
          type="password"
          id="pin"
          class="form-control"
          maxlength="4"
          placeholder="****"
          inputmode="numeric"
        />
      </div>

      <!-- Botón que ejecuta la función iniciarSesion(). -->
      <button class="btn btn-login-custom w-100" onclick="iniciarSesion()">
        Ingresar
      </button>
    </div>
  </div>

  <!-- Librería jQuery. -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

  <!-- Librería Popper, necesaria para ciertos componentes Bootstrap. -->
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>

  <!-- JavaScript de Bootstrap. -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

  <!-- Librería SweetAlert para alertas bonitas. -->
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

  <!-- Archivo principal de lógica JavaScript. -->
  <script src="./js/main.js"></script>
</body>
</html>
<!-- Fin index.html -->
