<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración básica. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título. -->
  <title>Gráfico</title>

  <!-- Icono. -->
  <link rel="icon" type="image/png" href="images/PKBL.png">

  <!-- Bootstrap. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- Estilos propios. -->
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="card shadow grafico-card">

      <!-- Encabezado de la página. -->
      <header class="grafico-header">
        <div class="d-flex justify-content-between align-items-center flex-wrap">
          <h2 class="mb-0">Gráfico de transacciones</h2>
          <a href="acciones.html" class="btn btn-volver-custom mt-3 mt-sm-0">Volver</a>
        </div>
      </header>

      <!-- Zona donde va el gráfico. -->
      <section class="grafico-content-section">
        <div class="chart-container">
          <!-- Aquí Chart.js dibuja el gráfico. -->
          <canvas id="graficoTransacciones"></canvas>
        </div>
      </section>
    </div>
  </div>

  <!-- Librería de Chart.js. -->
  <<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- SweetAlert. -->
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

  <!-- Script principal. -->
  <script src="./js/main.js"></script>
</body>
</html>
<!-- Fin grafico.html -->
